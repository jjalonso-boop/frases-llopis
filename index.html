<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensamientos para cada día</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #a6c1ee, #d4fc79);
            background-size: 400% 400%;
            animation: gradienteFluido 15s ease infinite;
            /* Se actualiza la familia de la fuente aquí */
            font-family: 'PT Serif', serif;
            text-align: center;
            padding: 20px;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        @keyframes gradienteFluido {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #contenedor {
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 420px; 
            width: 85%;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-in-out;
            pointer-events: none;
        }

        #frase {
            font-size: 1.4rem;
            color: #2c3e50;
            line-height: 1.6;
            margin: 0;
            /* PT Serif se ve muy bien en normal, pero mantengo el estilo si te gusta */
            font-style: normal; 
        }

        .instruccion {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: #555;
            opacity: 0.6;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <p id="frase">Cargando...</p>
    </div>

    <div class="instruccion">Toca la pantalla para otra frase</div>

    <script>
        document.write('<script src="frases.js?v=' + Date.now() + '"><\/script>');
    </script>

    <script> 
        let cargando = false;

        function nuevaFrase() { 
            if (cargando) return; 
            
            const elemento = document.getElementById("frase"); 
            const contenedor = document.getElementById("contenedor");

            if (typeof frases === 'undefined') { 
                setTimeout(nuevaFrase, 100);
                return; 
            } 

            if (frases.length > 0) { 
                cargando = true;
                const indiceAleatorio = Math.floor(Math.random() * frases.length); 
                
                contenedor.style.opacity = 0; 

                setTimeout(() => { 
                    elemento.textContent = frases[indiceAleatorio]; 
                    contenedor.style.opacity = 1; 
                    cargando = false;
                }, 400); 
            } 
        } 

        window.onload = nuevaFrase;
        document.body.addEventListener('click', nuevaFrase);

        window.onpageshow = function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        };
    </script> 
</body>
</html>
