<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensamientos para cada día</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Gradiente con varios colores que fluyen */
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #a6c1ee, #d4fc79);
            background-size: 400% 400%;
            animation: gradienteFluido 15s ease infinite;
            font-family: 'Playfair Display', serif;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animación para que el fondo se mueva solo */
        @keyframes gradienteFluido {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #contenedor {
            background: rgba(255, 255, 255, 0.9); 
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            /* Tamaño compacto y ajustado */
            max-width: 400px; 
            width: 85%;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-in-out;
        }

        #frase {
            font-size: 1.4rem;
            color: #2c3e50;
            line-height: 1.5;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <p id="frase">Cargando...</p>
    </div>

    <script>
        document.write('<script src="frases.js?v=' + Date.now() + '"><\/script>');
    </script>

    <script> 
        function nuevaFrase() { 
            const elemento = document.getElementById("frase"); 
            const contenedor = document.getElementById("contenedor");

            // Verificamos si la variable 'frases' del archivo externo existe
            if (typeof frases === 'undefined') { 
                setTimeout(nuevaFrase, 200);
                return; 
            } 

            if (frases.length > 0) { 
                // Elegimos una frase al azar
                const indice = Math.floor(Math.random() * frases.length); 

                // Transición suave: desaparece, cambia texto, aparece
                contenedor.style.opacity = 0; 

                setTimeout(() => { 
                    elemento.textContent = frases[indice]; 
                    contenedor.style.opacity = 1; 
                }, 400); 
            } 
        } 

        // Se ejecuta al cargar la página
        window.onload = nuevaFrase; 
    </script> 
</body>
</html>
