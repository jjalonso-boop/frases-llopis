<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensamientos para cada día</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Degradado animado: usamos 400% de tamaño para que se desplace */
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradienteDinamico 15s ease infinite;
            font-family: 'Playfair Display', serif;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Definición del movimiento del fondo */
        @keyframes gradienteDinamico {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #contenedor {
            background: rgba(255, 255, 255, 0.85); 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            /* Tamaño ajustado para que sea más estético */
            max-width: 420px; 
            width: 85%;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-in-out;
        }

        #frase {
            font-size: 1.4rem;
            color: #34495e;
            line-height: 1.6;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <p id="frase">Cargando...</p>
    </div>

    <script src="frases.js?v=1.2"></script>

    <script> 
        function nuevaFrase() { 
            const elemento = document.getElementById("frase"); 
            const contenedor = document.getElementById("contenedor");

            if (typeof frases === 'undefined') { 
                elemento.textContent = "Inspiración en camino..."; 
                return; 
            } 

            if (frases.length > 0) { 
                const indice = Math.floor(Math.random() * frases.length); 

                // Efecto de desvanecimiento al cambiar
                contenedor.style.opacity = 0; 

                setTimeout(() => { 
                    elemento.textContent = frases[indice]; 
                    contenedor.style.opacity = 1; 
                }, 400); 
            } 
        } 

        // Cargar la frase al iniciar
        window.onload = nuevaFrase; 

        // Opcional: Cambiar la frase automáticamente cada 30 segundos
        // setInterval(nuevaFrase, 30000);
    </script> 
</body>
</html>
