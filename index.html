<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensamientos para cada día</title>
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Nueva paleta más variada y moderna (Aurora Style) */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #ffbe0b, #fb5607);
            background-size: 400% 400%;
            animation: gradienteFluido 12s ease infinite;
            font-family: 'PT Serif', serif;
            text-align: center;
            padding: 40px;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        @keyframes gradienteFluido {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* El contenedor ahora es invisible (sin fondo ni bordes) */
        #contenedor {
            max-width: 800px; 
            width: 90%;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        #frase {
            /* Fuente más grande para que destaque sobre el fondo */
            font-size: 2.2rem;
            /* Color blanco con una ligera sombra para asegurar legibilidad */
            color: white;
            line-height: 1.4;
            margin: 0;
            font-weight: 700;
            text-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }

        .instruccion {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem;
            color: white;
            opacity: 0.7;
            font-family: sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Ajuste para pantallas pequeñas (móviles) */
        @media (max-width: 600px) {
            #frase {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <p id="frase">Cargando...</p>
    </div>

    <div class="instruccion">Toca para meditar otra frase</div>

    <script>
        document.write('<script src="frases.js?v=' + Date.now() + '"><\/script>');
    </script>

    <script> 
        let cargando = false;

        function nuevaFrase() { 
            if (cargando) return; 
            
            const elemento = document.getElementById("frase"); 
            const contenedor = document.getElementById("contenedor");

            if (typeof frases === 'undefined') { 
                setTimeout(nuevaFrase, 100);
                return; 
            } 

            if (frases.length > 0) { 
                cargando = true;
                const indiceAleatorio = Math.floor(Math.random() * frases.length); 
                
                contenedor.style.opacity = 0; 

                setTimeout(() => { 
                    elemento.textContent = frases[indiceAleatorio]; 
                    contenedor.style.opacity = 1; 
                    cargando = false;
                }, 500); 
            } 
        } 

        window.onload = nuevaFrase;
        document.body.addEventListener('click', nuevaFrase);

        window.onpageshow = function(event) {
            if (event.persisted) {
                window.location.reload();
            }
        };
    </script> 
</body>
</html>
