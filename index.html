<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensamientos para cada día</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
        }
        #contenedor {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            transition: opacity 0.5s ease-in-out;
        }
        #frase {
            font-size: 1.5rem;
            color: #333;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <p id="frase">Cargando...</p>
    </div>

    <script src="frases.js?v=REFRESCO_TOTAL"></script>

    <script>
        function nuevaFrase() {
            const elemento = document.getElementById("frase");
            
            // 1. Verificación de seguridad
            if (typeof frases === 'undefined') {
                console.error("Error: El archivo frases.js no cargó correctamente.");
                elemento.textContent = "Inspiración en camino... (Por favor, refresca la página)";
                return;
            }

            // 2. Selección aleatoria
            if (frases.length > 0) {
                const indice = Math.floor(Math.random() * frases.length);
                
                // Efecto visual de transición
                document.getElementById("contenedor").style.opacity = 0;
                
                setTimeout(() => {
                    elemento.textContent = frases[indice];
                    document.getElementById("contenedor").style.opacity = 1;
                }, 300);
            }
    //     }

        // Ejecutar al cargar la ventana
        window.onload = nuevaFrase;

        // Registro del Service Worker
     //   if ('serviceWorker' in navigator) {
     //       navigator.serviceWorker.register('service-worker.js')
     //           .then(() => console.log("Service Worker registrado con éxito"))
     //           .catch(err => console.error("Error al registrar SW:", err));
        }
    </script>
</body>
</html>
