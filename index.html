<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pensamientos para cada día</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(-45deg, #a1c4fd, #c2e9fb, #fbc2eb, #a6c1ee);
            background-size: 400% 400%;
            animation: gradienteDinamico 15s ease infinite;
            font-family: 'Playfair Display', serif;
            text-align: center;
            padding: 20px;
            overflow: hidden;
        }

        @keyframes gradienteDinamico {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #contenedor {
            background: rgba(255, 255, 255, 0.88); 
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 420px; 
            width: 85%;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-in-out;
        }

        #frase {
            font-size: 1.35rem;
            color: #2c3e50;
            line-height: 1.6;
            margin: 0;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div id="contenedor">
        <p id="frase">Cargando...</p>
    </div>

    <script>
        // 1. ELIMINAR SERVICE WORKERS (Esto descongela la página en móviles)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                    console.log("Service Worker eliminado para actualizar");
                }
            });
        }

        // 2. CARGAR FRASES (Con marcador de tiempo para que sea siempre archivo nuevo)
        document.write('<script src="frases.js?v=' + Date.now() + '"><\/script>');
    </script>

    <script> 
        function nuevaFrase() { 
            const elemento = document.getElementById("frase"); 
            const contenedor = document.getElementById("contenedor");

            if (typeof frases === 'undefined') { 
                setTimeout(nuevaFrase, 200);
                return; 
            } 

            if (frases.length > 0) { 
                const indice = Math.floor(Math.random() * frases.length); 
                contenedor.style.opacity = 0; 

                setTimeout(() => { 
                    elemento.textContent = frases[indice]; 
                    contenedor.style.opacity = 1; 
                }, 400); 
            } 
        } 

        window.onload = nuevaFrase; 
    </script> 
</body>
</html>
